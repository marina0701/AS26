<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Binary Cursor</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: rgb(0, 255, 34);
      font-family: monospace;
      font-size: 24px;
      display: flex;
      justify-content: left;
      align-items: left;
      height: 100vh;
    }

    .cursor {
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%   { opacity: 1; }
      50%  { opacity: 0; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="text">
    <span id="content">deinstalling gaming apps</span><span class="cursor">|</span>
  </div>

  <script>
    const content = document.getElementById("content");

    setTimeout(() => {
      content.innerHTML = "<p>deinstalling gaming<p> <p>Prozess startet<p> <p>gaming package detected<p> <p>unzip gaming package<p> <p>all gaming data detected<p> <p>all gaming data delete<p> <p>all package `Gaming`delete<p> <p>deinstalling all gaming App<p> <p>deinstalling deinstalling programm<p> <p>sucsessfull Prozess<p>";
    }, 1500);

    setTimeout(() => {
      content.textContent = "exe code 01100001 01110000 01110010 01101001 01101100 01100001 01110000 01110010 01101001 01101100";
    }, 5000);

    setTimeout(() => {
      content.textContent = ""; 
    }, 7000);
  </script>
</body>
</html>
